name: Bug report
description: Report incorrect behavior
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Smallest code that triggers the bug.
      render: python
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        - Hamon version:
        - JAX version:
        - Python version:
        - GPU / CPU:
    validations:
      required: true
